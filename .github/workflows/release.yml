name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.0.0)'
        required: true

# Needed for the release step to create a GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a tag push this is the tag; on manual dispatch use the provided tag.
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish standalone single-file win-x64 exe
        # IncludeNativeLibrariesForSelfExtract is also set on the CLI (not only in the csproj)
        # so re-running this workflow against an older tag still embeds the WPF native DLLs
        # and yields one runnable exe.
        run: >
          dotnet publish src/RavenAI/RavenAI.csproj
          -c Release -r win-x64
          -p:PublishSelfContained=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Stage release asset
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item publish/raven_ai.exe "dist/raven_ai-$tag-win-x64.exe"
          Get-ChildItem dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: raven_ai ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          # Fail loudly if the asset is missing instead of publishing an empty release.
          fail_on_unmatched_files: true
          files: dist/raven_ai-*-win-x64.exe
